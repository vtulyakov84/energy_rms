ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
#    <FilesMatch \.php$>
#        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost/"
#    </FilesMatch>

    DirectoryIndex index.php index.html
</VirtualHost>